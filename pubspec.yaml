name: app
description: ZenVlog — The Silent Synergy Journal
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # State & Navigation
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  # Local storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.2.2
  uuid: ^4.4.0
  # Maps
  flutter_map: ^7.0.2
  flutter_map_tile_caching: ^9.1.0
  # Bluetooth
  flutter_blue_plus: ^1.32.12
  # Audio
  record: ^6.1.1
  # ML: no TFLite — persona learning is a plain Dart EMA rule (the planned
  # model was trained on synthetic data mimicking exactly that rule).
  # Community (initialized Phase 6 only)
  supabase_flutter: ^2.5.6
  # Sensors
  sensors_plus: ^6.1.1
  # Location
  location: ^6.0.2
  # Code gen helpers
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  http: ^1.6.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/tasks/library.json
    - assets/hazards/hazard_zones.geojson
    - assets/badges/definitions.json
